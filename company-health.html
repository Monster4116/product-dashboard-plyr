<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Health</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>
<script>
  window.__PUBLIC_CONFIG__ = {
    appEnv: 'production',
    apiBaseUrl: 'https://toajcgsenjhtkmhisqkz.supabase.co/functions/v1',
  };
</script>
<script src="dashboard-pages.js"></script>
<script type="module" src="src/services/dashboard-api.browser.js"></script>
<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const CHART_COLORS = ['#5110DD','#36B1FF','#66BB6A','#FFA726','#AF91EF','#F44336','#29B6F6','#A3DBFF','#CCE8CD','#3A0B9D'];
const HEALTH_ENV = window.__PUBLIC_CONFIG__?.appEnv ?? 'local';
const HEALTH_CACHE_KEY = `dashboard.company-health.rows.v1.${HEALTH_ENV}`;

const fmt = {
  number: n => new Intl.NumberFormat('en-US').format(Math.round(Number(n) || 0)),
  pct: n => n == null ? '---' : `${(Number(n) * 100).toFixed(0)}%`,
  hours: n => Number(n || 0).toFixed(1),
  date: value => value ? new Date(value).toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'2-digit' }) : '---',
};

const normalizeRag = value => String(value || 'Unknown').trim();

const summarizeDrivers = (row) => {
  const drivers = [
    ['Growth', row.growth?.rag],
    ['CSM', row.csm?.rag],
    ['NPS', row.nps?.rag],
    ['Support', row.support?.rag],
  ].filter(([, value]) => {
    const normalized = normalizeRag(value).toLowerCase();
    return normalized.includes('red') || normalized.includes('amber');
  });

  if (!drivers.length) return ['Healthy'];

  return drivers.map(([label, value]) => `${label}: ${normalizeRag(value)}`);
};

const statusClass = value => {
  const normalized = normalizeRag(value).toLowerCase();
  if (normalized.includes('red')) return 'neg';
  if (normalized.includes('green')) return 'pos';
  return '';
};

const ChartCanvas = ({ config, height = 260 }) => {
  const ref = useRef(null);
  const chart = useRef(null);

  useEffect(() => {
    if (!ref.current || !config) return;
    if (chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, config);
    return () => chart.current && chart.current.destroy();
  }, [config]);

  return <canvas ref={ref} style={{ height, maxHeight: height }} />;
};

const LoadingScreen = () => (
  <div className="center-screen">
    <div className="spinner" />
    <p style={{ color:'var(--text-secondary)', fontSize:'0.8125rem' }}>Loading company health…</p>
  </div>
);

const ErrorScreen = ({ message }) => (
  <div className="center-screen">
    <div className="err-title">Failed to load company health</div>
    <div className="err-msg">{message}</div>
    <div className="err-msg" style={{ marginTop: 8 }}>
      This page uses the shared frontend service with local mock data until the future secure API path is ready.
    </div>
  </div>
);

const EmptyScreen = () => (
  <div className="center-screen">
    <div className="err-title">No company health records found</div>
    <div className="err-msg">The shared dashboard service returned an empty dataset.</div>
  </div>
);

const KPICard = ({ label, value, sub, sign }) => (
  <div className="kpi-card">
    <div className="kpi-label">{label}</div>
    <div className={`kpi-value${sign ? ` ${sign}` : ''}`}>{value}</div>
    {sub && <div className="kpi-sub">{sub}</div>}
  </div>
);

const StatusBadge = ({ value }) => {
  const normalized = normalizeRag(value).toLowerCase();
  const color = normalized.includes('red') ? '#F44336'
    : normalized.includes('amber') || normalized.includes('yellow') ? '#FFA726'
    : normalized.includes('green') ? '#66BB6A'
    : '#5110DD';
  return <span className="priority-badge" style={{ color, background: `${color}18` }}>{normalizeRag(value)}</span>;
};

function readHealthCache() {
  try {
    const raw = sessionStorage.getItem(HEALTH_CACHE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function writeHealthCache(rows) {
  try {
    sessionStorage.setItem(HEALTH_CACHE_KEY, JSON.stringify(rows));
  } catch (_) {
    // Ignore storage failures and continue from the in-memory state.
  }
}

const CompanyHealthView = ({ rows }) => {
  const [rag, setRag] = useState('');
  const [query, setQuery] = useState('');

  const rags = useMemo(() => [...new Set(rows.map(row => normalizeRag(row.rag)).filter(Boolean))].sort(), [rows]);

  const filtered = useMemo(() => {
    const needle = query.trim().toLowerCase();

    return rows.filter(row => {
      if (rag && normalizeRag(row.rag) !== rag) return false;
      if (needle && !String(row.companyId || '').toLowerCase().includes(needle)) return false;
      return true;
    });
  }, [rows, rag, query]);

  const stats = useMemo(() => {
    const ragMap = { Red: 0, Amber: 0, Green: 0 };
    let scoreTotal = 0;
    let supportTickets = 0;
    let supportCritical = 0;
    let coverageTotal = 0;
    let coverageRows = 0;

    filtered.forEach(row => {
      const normalizedRag = normalizeRag(row.rag);
      ragMap[normalizedRag] = (ragMap[normalizedRag] || 0) + 1;
      scoreTotal += Number(row.score) || 0;
      supportTickets += Number(row.support?.ticketCount) || 0;
      supportCritical += Number(row.support?.criticalCount) || 0;
      if (row.metricCoveragePct != null) {
        coverageTotal += Number(row.metricCoveragePct) || 0;
        coverageRows += 1;
      }
    });

    return {
      companies: filtered.length,
      averageScore: filtered.length ? scoreTotal / filtered.length : 0,
      redCount: ragMap.Red || 0,
      amberCount: ragMap.Amber || 0,
      greenCount: ragMap.Green || 0,
      supportTickets,
      supportCritical,
      averageCoveragePct: coverageRows ? coverageTotal / coverageRows : null,
      ragMap,
    };
  }, [filtered]);

  const ragChart = useMemo(() => ({
    type: 'doughnut',
    data: {
      labels: Object.keys(stats.ragMap),
      datasets: [{
        data: Object.values(stats.ragMap),
        backgroundColor: ['#F44336', '#FFA726', '#66BB6A', '#5110DD'],
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { color:'#49454F', font:{ family:'Poppins', size:11 }, boxWidth: 12 }
        }
      }
    }
  }), [stats]);

  const topRisk = useMemo(() => (
    [...filtered]
      .sort((a, b) => {
        const scoreDiff = (Number(a.score) || 0) - (Number(b.score) || 0);
        if (scoreDiff !== 0) return scoreDiff;
        return (Number(b.support?.criticalCount) || 0) - (Number(a.support?.criticalCount) || 0);
      })
      .slice(0, 12)
  ), [filtered]);

  return (
    <div className="tab-content">
      <section className="page-hero compact">
        <div>
          <div className="eyebrow">Live dashboard</div>
          <h1 className="page-hero-title">Company health</h1>
          <p className="page-hero-copy">
            Monitor company-level health scores, RAG distribution and the support, growth, CSM and NPS signals driving at-risk accounts.
          </p>
        </div>
        <div className="hero-stat-block">
          <span className="status-pill live">Live</span>
          <div className="hero-stat-kicker">Data source</div>
          <div className="hero-stat-value">{HEALTH_ENV === 'local' ? 'Local mock' : 'Dashboard API'}</div>
          <div className="hero-stat-meta">{fmt.number(rows.length)} companies loaded</div>
        </div>
      </section>

      <div className="section-header">
        <div>
          <h2 className="section-title">Filters</h2>
          <p className="section-sub">Filter the current company health snapshot by RAG status and company identifier.</p>
        </div>
        <div style={{ display:'flex', gap: 10, flexWrap:'wrap' }}>
          <select className="f-select" value={rag} onChange={e => setRag(e.target.value)}>
            <option value="">All RAG statuses</option>
            {rags.map(item => <option key={item} value={item}>{item}</option>)}
          </select>
          <input
            className="f-select"
            type="search"
            placeholder="Search CO ID"
            value={query}
            onChange={e => setQuery(e.target.value)}
            style={{ minWidth: 180 }}
          />
        </div>
      </div>

      <div className="kpi-grid">
        <KPICard label="Companies" value={fmt.number(stats.companies)} sub="Filtered health records" />
        <KPICard label="Avg health score" value={fmt.number(stats.averageScore)} />
        <KPICard label="Red / Amber / Green" value={`${fmt.number(stats.redCount)} / ${fmt.number(stats.amberCount)} / ${fmt.number(stats.greenCount)}`} />
        <KPICard label="Support tickets" value={fmt.number(stats.supportTickets)} />
        <KPICard label="Critical tickets" value={fmt.number(stats.supportCritical)} sign={stats.supportCritical > 0 ? 'neg' : 'pos'} />
        <KPICard label="Avg metric coverage" value={fmt.pct(stats.averageCoveragePct)} />
      </div>

      <div className="charts-row">
        <div className="chart-card" style={{ flex: 1 }}>
          <div className="chart-title">Companies by RAG</div>
          <ChartCanvas config={ragChart} />
        </div>
        <div className="chart-card" style={{ flex: 2 }}>
          <div className="chart-title">Lowest health score companies</div>
          <div className="table-wrap" style={{ marginBottom: 0 }}>
            <table className="data-table">
              <thead><tr><th>CO ID</th><th className="r">Score</th><th>RAG</th><th>Growth</th><th>CSM</th><th>NPS</th><th>Support</th><th className="r">Critical</th></tr></thead>
              <tbody>
                {topRisk.map(row => (
                  <tr key={row.companyId}>
                    <td>{row.companyId}</td>
                    <td className={`r ${statusClass(row.rag)}`}>{fmt.number(row.score)}</td>
                    <td><StatusBadge value={row.rag} /></td>
                    <td><StatusBadge value={row.growth.rag} /></td>
                    <td><StatusBadge value={row.csm.rag} /></td>
                    <td><StatusBadge value={row.nps.rag} /></td>
                    <td><StatusBadge value={row.support.rag} /></td>
                    <td className="r">{fmt.number(row.support.criticalCount)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div className="chart-card">
        <div className="chart-title">Company health records</div>
        <div className="table-wrap" style={{ marginBottom: 0 }}>
          <table className="data-table">
            <thead><tr><th>CO ID</th><th>Score date</th><th className="r">Score</th><th>RAG</th><th>Driver summary</th><th className="r">Tickets</th><th className="r">Critical</th><th>Last updated</th></tr></thead>
            <tbody>
              {filtered.map(row => (
                <tr key={`${row.companyId}-${row.scoreDate}`}>
                  <td>{row.companyId}</td>
                  <td>{row.scoreDate || '---'}</td>
                  <td className={`r ${statusClass(row.rag)}`}>{fmt.number(row.score)}</td>
                  <td><StatusBadge value={row.rag} /></td>
                  <td>
                    <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
                      {summarizeDrivers(row).map(driver => <span key={`${row.companyId}-${driver}`} className="driver-pill">{driver}</span>)}
                    </div>
                  </td>
                  <td className="r">{fmt.number(row.support.ticketCount)}</td>
                  <td className="r">{fmt.number(row.support.criticalCount)}</td>
                  <td>{fmt.date(row.lastUpdated)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="chart-card secondary-section">
        <div className="chart-title">Recommended actions by company</div>
        <div className="table-wrap" style={{ marginBottom: 0 }}>
          <table className="data-table">
            <thead><tr><th>CO ID</th><th>Growth action</th><th>CSM action</th><th>NPS action</th><th>Support action</th><th>Coverage</th><th className="r">Avg hours</th></tr></thead>
            <tbody>
              {filtered.map(row => (
                <tr key={`${row.companyId}-actions`}>
                  <td>{row.companyId}</td>
                  <td>{row.growth.action || '---'}</td>
                  <td>{row.csm.action || '---'}</td>
                  <td>{row.nps.action || '---'}</td>
                  <td>{row.support.action || '---'}</td>
                  <td>{fmt.pct(row.metricCoveragePct)}</td>
                  <td className="r">{fmt.hours(row.support.avgHours)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [healthRows, setHealthRows] = useState(() => readHealthCache());
  const [loading, setLoading] = useState(() => readHealthCache().length === 0);
  const [error, setError] = useState('');

  useEffect(() => {
    const load = async () => {
      try {
        const cachedRows = readHealthCache();
        if (cachedRows.length) {
          setHealthRows(cachedRows);
          setLoading(false);
          return;
        }

        if (!window.dashboardApi || typeof window.dashboardApi.getCompanyHealth !== 'function') {
          throw new Error('The shared dashboard service is not available in the browser yet.');
        }

        // Today this page reads mock data through the shared dashboard service.
        // In the next backend phase, the same service method can switch to the
        // configured API boundary without changing the page-level UI logic.
        const companyHealth = await window.dashboardApi.getCompanyHealth();
        setHealthRows(companyHealth);
        writeHealthCache(companyHealth);
      } catch (e) {
        setError(e.message || String(e));
      } finally {
        setLoading(false);
      }
    };

    load();
  }, []);

  const sidebar = { __html: window.renderSidebar('company-health') };

  return (
    <div className="shell">
      <div style={{ display:'contents' }} dangerouslySetInnerHTML={sidebar} />
      <main className="app">
        <header className="app-header">
          <div className="header-left">
            <div className="logo">Company Health</div>
            <div className="header-sub">Dedicated dashboard page · service-backed dataset</div>
          </div>
          <a className="header-link" href="index.html">Back to home</a>
        </header>
        <section className="app-main">
          {loading ? <LoadingScreen /> : error ? <ErrorScreen message={error} /> : healthRows.length === 0 ? <EmptyScreen /> : <CompanyHealthView rows={healthRows} />}
        </section>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
