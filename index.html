            { key:'employeeName', label:'Employee', render:r=><span style={{fontWeight:600}}>{isLoadingShell ? <Glimmer variant="text" w="120px" /> : (r.employeeName || r.eeId || 'Unknown')}</span> },
            { key:'territory', label:'Territory' },
            { key:'paymentType', label:'Payment', render:r => { if (isLoadingShell) return <Glimmer variant="badge" />; const c=badgeFor(PAY_BADGE,r.paymentType); return <Badge label={r.paymentType || 'Unknown'} bg={c.bg} color={c.color} />; } },
            { key:'lifecycleStatus', label:'Lifecycle', render:r => { if (isLoadingShell) return <Glimmer variant="badge" />; const c=badgeFor(LIFE_BADGE,r.lifecycleStatus); return <Badge label={String(r.lifecycleStatus || 'Unknown').replace(/_/g,' ')} bg={c.bg} color={c.color} />; } },
            { key:'prevUsdTotal', label:'Previous', align:'right', render:r=>isLoadingShell ? <Glimmer variant="text" /> : fmtUSD(r.prevUsdTotal) },
            { key:'currUsdTotal', label:'Current', align:'right', render:r=>isLoadingShell ? <Glimmer variant="text" /> : fmtUSD(r.currUsdTotal) },
            { key:'usdDelta', label:'Movement', align:'right', render:r=>isLoadingShell ? <Glimmer variant="row" /> : <PayrollMiniBar value={r.usdDelta} max={maxMoverDelta} /> },
          ]}
        />
      </div>
    </div>
  );
};

              <ChartCanvas config={ragCfg} height={200} />
            </div>
          )}
        </div>
      </div>

      {/* ── Row 2: Metric Health Matrix ── */}
      <div className="chart-card">
        <div className="chart-title">Metric health matrix — company count by RAG status per metric</div>
        {isL ? <ChartGlimmer height={180} label="Loading metric matrix…" /> : <ChartCanvas config={matrixCfg} height={180} />}
      </div>

      {/* ── Row 3: Score Distribution ── */}
      <div className="chart-card">
        <div className="chart-title">Score distribution</div>
        {isL ? <ChartGlimmer height={180} label="Loading score distribution…" /> : <ChartCanvas config={distCfg} height={180} />}
      </div>

      {/* ── Row 4: Top 10 At-Risk ── */}
      <div className="chart-card">
        <div className="section-header" style={{marginBottom:'12px'}}>
          <div>
            <h3 className="section-title">Top 10 at-risk accounts</h3>
            <p className="section-sub">Sorted by health score ascending — lowest first</p>
          </div>
          {!isL && s.SCORE_DATE && (
            <div style={{fontSize:'0.75rem', color:'var(--text-secondary)'}}>As of {s.SCORE_DATE}</div>
          )}
        </div>
        <div className="table-wrap" style={{marginBottom:0}}>
          <table className="data-table">
            <thead>
              <tr>
                <th style={{width:28}}>#</th>
                <th>Company</th>
                <th className="r">Score</th>
                <th>Status</th>
                <th>Metrics <span style={{fontWeight:400,color:'var(--text-disabled)',fontSize:'0.5625rem'}}>G·C·N·S</span></th>
                <th>Top recommended action</th>
                <th>Priority</th>
              </tr>
            </thead>
            <tbody>
              {isL
                ? <LoadingTableRows columns={7} rows={5} />
                : top10.length === 0
                  ? <tr><td colSpan={7} className="no-data">No at-risk data yet — run the n8n pipeline first.</td></tr>
                  : top10.map((co, i) => {
                      const pConf = H_PRIORITY[co.top_action?.priority] || H_PRIORITY.medium;
                      const scoreColor = co.score < 50 ? '#F44336' : co.score < 70 ? '#FFA726' : '#66BB6A';
                      return (
                        <tr key={co.company_id || i}>
                          <td style={{color:'var(--text-disabled)', fontWeight:600, fontSize:'0.75rem'}}>{i + 1}</td>
                          <td style={{fontWeight:600}}>{co.company_name}</td>
                          <td className="r" style={{fontWeight:700, color:scoreColor, fontSize:'1.05rem'}}>{co.score}</td>
                          <td><RagBadge rag={co.rag} /></td>
                          <td>
                            <span style={{display:'inline-flex', alignItems:'center'}}>
                              <MetricDot rag={co.metrics?.growth}  title={`Employee Growth: ${co.metrics?.growth}`} />
                              <MetricDot rag={co.metrics?.csm}     title={`CSM Sentiment: ${co.metrics?.csm}`} />
                              <MetricDot rag={co.metrics?.nps}     title={`NPS: ${co.metrics?.nps}`} />
                              <MetricDot rag={co.metrics?.support} title={`Support: ${co.metrics?.support}`} />
                            </span>
                          </td>
                          <td style={{maxWidth:'260px', overflow:'hidden', textOverflow:'ellipsis', color:'var(--text-secondary)', fontSize:'0.75rem'}}>
                            {co.top_action
                              ? <span><span style={{color:'var(--text-primary)', fontWeight:500}}>{co.top_action.metric}:</span> {co.top_action.title}</span>
                              : '—'}
                          </td>
                          <td>
                            {co.top_action
                              ? <span className="priority-badge" style={{background:pConf.bg, color:pConf.color, fontSize:'0.625rem'}}>{pConf.label}</span>
                              : '—'}
                          </td>
                        </tr>
                      );
                    })
              }
            </tbody>
          </table>
        </div>
      </div>

    </div>
  );
};

// ── APP ROOT ──────────────────────────────────────────────────────────────────

const App = () => {
  // FME state — loads immediately on mount
  const [fme, setFme]       = useState({ loading:true, error:null, rawData:[], cleanedData:[], taxonomy:[], meta:{} });
  // ARR state — loads lazily on first selection
  const [arr, setArr]       = useState({ loading:false, loaded:false, error:null, arrMetrics:[], arrSummary:{}, arrFlagCount:{}, arrCompanies:[], meta:{} });
  // Payroll state — loads lazily on first selection.
  // Demo version reads only Payroll_Dashboard_Summary.
  const [payroll, setPayroll] = useState({
    loading:false, loaded:false, error:null,
    months:[], selectedMonth:null,
    summary:null, meta:{},
  });
  // Customer Health state — loads lazily on first selection
  const [health, setHealth] = useState({ loading:false, loaded:false, error:null, summary:null, meta:{} });

  const [activeTab, setTab]     = useState('overview');
  const [activeDash, setDash]   = useState('home');
  const [sidebarOpen, setSidebar] = useState(true);

  // ── Load FME on mount ───────────────────────────────────────────────────────
  useEffect(() => {
    if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
      setFme(s=>({...s, loading:false, error:'APPS_SCRIPT_URL is not configured. Open index.html and replace YOUR_APPS_SCRIPT_URL_HERE with your deployed Apps Script URL.'}));
      return;
    }
    fetch(APPS_SCRIPT_URL)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => {
        if (d.error) throw new Error(d.error);
        setFme({
          loading:false, error:null,
          rawData:    d.rawData     || d.cleanedData || [],
          cleanedData:d.cleanedData || [],
          taxonomy:   d.taxonomy    || [],
          meta:       d.meta        || {}
        });
      })
      .catch(err => setFme(s=>({...s, loading:false, error:err.message})));
  }, []);

  // ── Load ARR lazily when tab first selected ─────────────────────────────────
  useEffect(() => {
    if (activeDash !== 'arr') return;
    if (arr.loaded || arr.loading) return;

    if (!ARR_SCRIPT_URL || ARR_SCRIPT_URL === 'YOUR_ARR_SCRIPT_URL_HERE') {
      setArr(s => ({ ...s, loading:false, loaded:false, error:'ARR_SCRIPT_URL is not configured.' }));
      return;
    }

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    setArr(s=>({...s, loading:true, error:null}));
    fetch(`${ARR_SCRIPT_URL}?mode=summary`, { method:'GET', signal:controller.signal, cache:'no-store' })
      .then(async r => {
        const text = await r.text();
        if (!r.ok) throw new Error(`ARR endpoint failed with HTTP ${r.status}: ${text.slice(0, 300)}`);
        try { return JSON.parse(text); }
        catch (e) { throw new Error(`ARR endpoint did not return valid JSON. Response started with: ${text.slice(0, 300)}`); }
      })
      .then(d => {
        if (d.error) throw new Error(d.error);

        console.log('ARR response meta:', d.meta);
        console.log('ARR summary keys:', Object.keys(d.arrSummary || {}));
        console.log('ARR first month summary:', Object.entries(d.arrSummary || {})[0]);
        console.log('ARR metrics sample:', (d.arrMetrics || []).slice(0, 5));

        setArr({
          loading:false, loaded:true, error:null,
          arrMetrics:   Array.isArray(d.arrMetrics) ? d.arrMetrics : [],
          arrSummary:   d.arrSummary && typeof d.arrSummary === 'object' ? d.arrSummary : {},
          arrFlagCount: d.arrFlagCount && typeof d.arrFlagCount === 'object' ? d.arrFlagCount : {},
          arrCompanies: [],
          meta:         d.meta || {},
        });
      })
      .catch(err => {
        const msg = err.name === 'AbortError'
          ? 'ARR data request timed out after 30 seconds. The Apps Script is likely taking too long to read the Google Sheet.'
          : err.message;
        setArr(s=>({...s, loading:false, loaded:false, error:msg}));
      })
      .finally(() => clearTimeout(timeout));
  }, [activeDash, arr.loaded, arr.loading]);

  // ── Load Payroll summary on first selection ────────────────────────────────
  useEffect(() => {
    if (activeDash !== 'payroll') return;
    if (payroll.loaded || payroll.loading) return;

    if (!PAYROLL_SCRIPT_URL || PAYROLL_SCRIPT_URL === 'YOUR_PAYROLL_SCRIPT_URL_HERE') {
      setPayroll(s => ({ ...s, loading:false, loaded:false, error:'PAYROLL_SCRIPT_URL is not configured.' }));
      return;
    }

    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 30000);

    setPayroll(s => ({ ...s, loading:true, error:null }));

    fetch(`${PAYROLL_SCRIPT_URL}?mode=months`, { signal: ctrl.signal, cache:'no-store' })
      .then(async r => {
        const text = await r.text();
        if (!r.ok) throw new Error(`Months endpoint failed with HTTP ${r.status}: ${text.slice(0, 300)}`);
        try { return JSON.parse(text); }
        catch (e) { throw new Error(`Months endpoint did not return valid JSON. Response started with: ${text.slice(0, 300)}`); }
      })
      .then(async monthsData => {
        if (monthsData.error) throw new Error(monthsData.error);

        const months = Array.isArray(monthsData.months) ? monthsData.months : [];
        const latestMonth = monthsData.latestMonth || months[months.length - 1] || '';

        if (!latestMonth) {
          setPayroll(s => ({ ...s, loading:false, loaded:true, months, selectedMonth:'', summary:null, meta:monthsData.meta || {} }));
          return;
        }

        const summaryRes = await fetch(
          `${PAYROLL_SCRIPT_URL}?mode=summary&month=${encodeURIComponent(latestMonth)}`,
          { signal: ctrl.signal, cache:'no-store' }
        );
        const summaryText = await summaryRes.text();
        if (!summaryRes.ok) throw new Error(`Summary endpoint failed with HTTP ${summaryRes.status}: ${summaryText.slice(0, 300)}`);

        let summaryData;
        try { summaryData = JSON.parse(summaryText); }
        catch (e) { throw new Error(`Summary endpoint did not return valid JSON. Response started with: ${summaryText.slice(0, 300)}`); }

        if (summaryData.error) throw new Error(summaryData.error);

        setPayroll({
          loading:false,
          loaded:true,
          error:null,
          months,
          selectedMonth: latestMonth,
          summary: summaryData.summary || summaryData.payrollSummary || null,
          meta: summaryData.meta || {},
        });
      })
      .catch(err => {
        const msg = err.name === 'AbortError' ? 'Payroll summary request timed out after 30 seconds.' : err.message;
        setPayroll(s => ({ ...s, loading:false, loaded:false, error:msg }));
      })
      .finally(() => clearTimeout(timeout));
  }, [activeDash, payroll.loaded, payroll.loading]);

  // ── Reload Payroll summary when the selected month changes ─────────────────
  useEffect(() => {
    if (activeDash !== 'payroll') return;
    if (!payroll.selectedMonth) return;
    if (!payroll.loaded) return;

    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 30000);
    const month = payroll.selectedMonth;

    setPayroll(s => ({ ...s, loading:true, error:null, summary:null }));

    fetch(`${PAYROLL_SCRIPT_URL}?mode=summary&month=${encodeURIComponent(month)}`, {
      signal: ctrl.signal,
      cache:'no-store'
    })
      .then(async r => {
        const text = await r.text();
        if (!r.ok) throw new Error(`Summary endpoint failed with HTTP ${r.status}: ${text.slice(0, 300)}`);
        try { return JSON.parse(text); }
        catch (e) { throw new Error(`Summary endpoint did not return valid JSON. Response started with: ${text.slice(0, 300)}`); }
      })
      .then(d => {
        if (d.error) throw new Error(d.error);
        setPayroll(s => ({
          ...s,
          loading:false,
          loaded:true,
          summary: d.summary || d.payrollSummary || null,
          meta: d.meta || {},
        }));
      })
      .catch(err => {
        const msg = err.name === 'AbortError' ? 'Payroll summary request timed out after 30 seconds.' : err.message;
        setPayroll(s => ({ ...s, loading:false, error:msg }));
      })
      .finally(() => clearTimeout(timeout));
  }, [payroll.selectedMonth]);

  // ── Load Customer Health lazily when tab first selected ───────────────────
  useEffect(() => {
    if (activeDash !== 'health') return;
    if (health.loaded || health.loading) return;

    if (!HEALTH_SCRIPT_URL || HEALTH_SCRIPT_URL === 'YOUR_HEALTH_SCRIPT_URL_HERE') {
      setHealth(s => ({ ...s, loading:false, loaded:false, error:'HEALTH_SCRIPT_URL is not configured. Deploy CustomerHealth_AppScript.gs and paste the /exec URL into index.html.' }));
      return;
    }

    const ctrl = new AbortController();
    const timeout = setTimeout(() => ctrl.abort(), 30000);

    setHealth(s => ({ ...s, loading:true, error:null }));

    fetch(`${HEALTH_SCRIPT_URL}?mode=healthSummary`, { signal:ctrl.signal, cache:'no-store' })
      .then(async r => {
        const text = await r.text();
        if (!r.ok) throw new Error(`Health endpoint failed with HTTP ${r.status}: ${text.slice(0, 300)}`);
        try { return JSON.parse(text); }
        catch (e) { throw new Error(`Health endpoint did not return valid JSON. Response started with: ${text.slice(0, 300)}`); }
      })
      .then(d => {
        if (d.error) throw new Error(d.error);
        setHealth({ loading:false, loaded:true, error:null, summary:d.summary || null, meta:d.meta || {} });
      })
      .catch(err => {
        const msg = err.name === 'AbortError' ? 'Health data request timed out after 30 seconds.' : err.message;
        setHealth(s => ({ ...s, loading:false, loaded:false, error:msg }));
      })
      .finally(() => clearTimeout(timeout));
  }, [activeDash, health.loaded, health.loading]);

  const { rawData, cleanedData, taxonomy, meta } = fme;
  const isPartial = cleanedData.length < rawData.length;
  const showTabs  = activeDash === 'finance';
  const TABS      = [['overview','Overview'],['gaps','Product gaps'],['trend','Trend analysis']];
  const PAYROLL_TABS = [['overview','Overview']];
  const activeMeta = activeDash === 'arr' ? arr.meta : activeDash === 'payroll' ? payroll.meta : activeDash === 'health' ? health.meta : meta;

  const handleDashChange = id => { setDash(id); setTab('overview'); };

  // ── Header subtitle ─────────────────────────────────────────────────────────
  const headerSub =
    activeDash === 'home'    ? 'Playroll Internal Analytics · Beta' :
    activeDash === 'arr'
      ? arr.loading ? 'Loading ARR data…'
        : arr.loaded ? `ARR intelligence · ${Object.keys(arr.arrSummary).length} months`
        : 'Select to load'
    : activeDash === 'payroll'
      ? payroll.loading ? 'Loading payroll data…'
        : payroll.loaded ? `Payroll validation summary · ${payroll.summary?.TOTAL_EMPLOYEES ? fmt.number(payroll.summary.TOTAL_EMPLOYEES) : '—'} employees · ${payroll.months.length} months available`
        : 'Select to load'
    : activeDash === 'health'
      ? health.loading ? 'Loading health data…'
        : health.loaded ? `Customer health · ${health.summary?.TOTAL_COMPANIES || '—'} accounts · scored ${health.summary?.SCORE_DATE || '—'}`
        : 'Select to load'
    : fme.loading ? 'Loading…'
      : `Variance analysis intelligence · ${fmt.number(rawData.length)} total records${isPartial ? ` · ${fmt.number(cleanedData.length)} classified` : ''}`;

  return (
    <div className="shell">
      <style>{`@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}} @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}`}</style>
      <Sidebar
        open={sidebarOpen}
        onToggle={() => setSidebar(o => !o)}
        activeDash={activeDash}
        onDashChange={handleDashChange}
      />

      <div className="app">
        <header className="app-header">
          <div className="header-left">
            <div className="logo">{activeDash==='home' ? 'Internal Analytics' : activeDash==='arr' ? 'ARR' : activeDash==='payroll' ? 'Payroll validation' : activeDash==='health' ? 'Customer health' : 'Finance adjustments'}</div>
            <div className="header-sub">{headerSub} · Updated {activeMeta?.generatedAt ? new Date(activeMeta.generatedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—'}</div>
          </div>
          <nav className="tab-nav">
            {activeDash === 'payroll' && (
              <>
                {payroll.months.length > 0 && (
                  <select className="f-select" style={{marginRight:'8px'}} value={payroll.selectedMonth||''} onChange={e=>setPayroll(s=>({...s,selectedMonth:e.target.value,summary:null,meta:{}}))}>
                    {payroll.months.map(m=>(
                      <option key={m} value={m}>{new Date(m).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>
                    ))}
                  </select>
                )}
                {PAYROLL_TABS.map(([id,label])=>(
                  <button key={id} className="tab-btn active" disabled>{label}</button>
                ))}
              </>
            )}
            {showTabs && TABS.map(([id,label])=>(
              <button key={id} className={`tab-btn${activeTab===id?' active':''}`} onClick={()=>setTab(id)}>{label}</button>
            ))}
          </nav>
        </header>

        <main className="app-main">

          {/* ── Home ── */}
          {activeDash==='home' && (
            <HomePage onNavigate={id => { setDash(id); setTab('overview'); }} />
          )}

          {/* ── Finance Adjustments ── */}
          {activeDash==='finance' && (
            fme.error ? <ErrorScreen msg={fme.error} /> :
            <>
              {activeTab==='overview' && <Overview rows={rawData} taxonomy={taxonomy} loading={fme.loading} />}
              {activeTab==='gaps' && (
                <div>
                  {!fme.loading && isPartial && <div style={{maxWidth:'1440px',margin:'0 auto'}}><CoverageBanner rawCount={rawData.length} cleanedCount={cleanedData.length} /></div>}
                  <ProductGaps rows={cleanedData} taxonomy={taxonomy} loading={fme.loading} />
                </div>
              )}
              {activeTab==='trend' && (
                <div>
                  {!fme.loading && isPartial && <div style={{maxWidth:'1440px',margin:'0 auto'}}><CoverageBanner rawCount={rawData.length} cleanedCount={cleanedData.length} /></div>}
                  <TrendAnalysis rows={cleanedData} taxonomy={taxonomy} loading={fme.loading} />
                </div>
              )}
            </>
          )}

          {/* ── ARR ── */}
          {activeDash==='arr' && (
            arr.error ? <ErrorScreen msg={arr.error} /> :
            <ARRDashboard
              arrMetrics={arr.arrMetrics}
              arrSummary={arr.arrSummary}
              arrFlagCount={arr.arrFlagCount}
              loading={arr.loading}
            />
          )}

          {/* ── Payroll Validation ── */}
          {activeDash==='payroll' && (
            payroll.error ? <ErrorScreen msg={payroll.error} /> :
            <PayrollOverview summary={payroll.summary} meta={payroll.meta} loading={payroll.loading} />
          )}

          {/* ── Customer Health ── */}
          {activeDash==='health' && (
            health.error ? <ErrorScreen msg={health.error} /> :
            <CustomerHealthDashboard summary={health.summary} meta={health.meta} loading={health.loading} />
          )}

        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
