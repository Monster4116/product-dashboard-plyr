<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product One | Finance Adjustments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="styles.css?v=20260508-sidebar1">
</head>
<body>
<div id="root"></div>
<script>
  window.__PUBLIC_CONFIG__ = {
    appEnv: 'production',
    apiBaseUrl: 'https://toajcgsenjhtkmhisqkz.supabase.co/functions/v1',
  };
</script>
<script src="dashboard-pages.js?v=20260508-sidebar1"></script>
<script type="module" src="src/services/dashboard-api.browser.js?v=20260508-feedback4"></script>
<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const CHART_COLORS = ['#5110DD','#36B1FF','#66BB6A','#FFA726','#AF91EF','#F44336','#29B6F6','#A3DBFF','#CCE8CD','#3A0B9D'];
const FINANCE_ENV = window.__PUBLIC_CONFIG__?.appEnv ?? 'local';
const FINANCE_CACHE_KEY = `dashboard.finance-adjustments.rows.v3.${FINANCE_ENV}`;
const TAXONOMY_PATH = 'data/finance-adjustment-taxonomy.csv';

const fmt = {
  currency: n => {
    const v = Number(n) || 0;
    const abs = Math.abs(v);
    const sign = v < 0 ? '-' : '';
    if (abs >= 1000000) return `${sign}$${(abs / 1000000).toFixed(2)}M`;
    if (abs >= 1000) return `${sign}$${(abs / 1000).toFixed(1)}K`;
    return `${sign}$${abs.toFixed(0)}`;
  },
  number: n => new Intl.NumberFormat('en-US').format(Math.round(Number(n) || 0)),
  pct: n => `${(Number(n) || 0).toFixed(1)}%`,
};

const parseMonth = value => {
  if (!value) return null;
  const d = new Date(value);
  return Number.isNaN(d.getTime()) ? null : d;
};

const monthKey = value => {
  const d = parseMonth(value);
  if (!d) return 'Unknown';
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}`;
};

const monthLabel = key => {
  if (key === 'Unknown') return key;
  const [year, month] = key.split('-').map(Number);
  return new Date(year, month - 1, 1).toLocaleDateString('en-GB', { month:'short', year:'2-digit' });
};

const useDashboardTheme = () => {
  const [theme, setTheme] = useState(() => window.getDashboardTheme ? window.getDashboardTheme() : 'light');

  useEffect(() => {
    const handleThemeChange = event => {
      setTheme(event.detail?.theme || (window.getDashboardTheme ? window.getDashboardTheme() : 'light'));
    };

    window.addEventListener('dashboard-theme-change', handleThemeChange);
    return () => window.removeEventListener('dashboard-theme-change', handleThemeChange);
  }, []);

  return theme;
};

const getChartPalette = () => (
  window.getDashboardThemePalette
    ? window.getDashboardThemePalette()
    : {
        chartText: '#49454F',
        chartGrid: '#E9E9EA',
        chartBar: '#5110DDAA',
        chartBarBorder: '#5110DD',
        chartLine: '#36B1FF',
        chartFill: '#36B1FF22',
      }
);

const ChartCanvas = ({ config, height = 260 }) => {
  const ref = useRef(null);
  const chart = useRef(null);

  useEffect(() => {
    if (!ref.current || !config) return;
    if (chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, config);
    return () => chart.current && chart.current.destroy();
  }, [config]);

  return <canvas ref={ref} style={{ height, maxHeight: height }} />;
};

const LoadingScreen = () => (
  <div className="center-screen">
    <div className="spinner" />
    <p style={{ color:'var(--text-secondary)', fontSize:'0.8125rem' }}>Loading finance adjustments…</p>
  </div>
);

const ErrorScreen = ({ message }) => (
  <div className="center-screen">
    <div className="err-title">Failed to load finance adjustments</div>
    <div className="err-msg">{message}</div>
    <div className="err-msg" style={{ marginTop: 8 }}>
      This page reads through the shared frontend service layer and taxonomy reference asset. If the live dataset or taxonomy file cannot be reached, the drill-down views will not load correctly.
    </div>
  </div>
);

const KPICard = ({ label, value, sub, sign }) => (
  <div className="kpi-card">
    <div className="kpi-label">{label}</div>
    <div className={`kpi-value${sign ? ` ${sign}` : ''}`}>{value}</div>
    {sub && <div className="kpi-sub">{sub}</div>}
  </div>
);

function readFinanceCache() {
  try {
    const raw = sessionStorage.getItem(FINANCE_CACHE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function writeFinanceCache(rows) {
  try {
    sessionStorage.setItem(FINANCE_CACHE_KEY, JSON.stringify(rows));
  } catch (_) {
    // Ignore storage write failures; the page can still work from live fetches.
  }
}

function splitCsvLine(line) {
  const values = [];
  let current = '';
  let inQuotes = false;

  for (let index = 0; index < line.length; index += 1) {
    const char = line[index];
    const next = line[index + 1];

    if (char === '"') {
      if (inQuotes && next === '"') {
        current += '"';
        index += 1;
      } else {
        inQuotes = !inQuotes;
      }
      continue;
    }

    if (char === ',' && !inQuotes) {
      values.push(current);
      current = '';
      continue;
    }

    current += char;
  }

  values.push(current);
  return values.map(value => value.trim());
}

function parseCsv(text) {
  const lines = text.replace(/\r\n/g, '\n').split('\n').filter(Boolean);
  if (!lines.length) return [];

  const headers = splitCsvLine(lines[0]);
  return lines.slice(1).map(line => {
    const values = splitCsvLine(line);
    return headers.reduce((row, header, index) => {
      row[header] = values[index] ?? '';
      return row;
    }, {});
  });
}

function deriveCategoryCode(subCategoryCode) {
  const parts = String(subCategoryCode || '').split('-').filter(Boolean);
  return parts.length >= 2 ? `${parts[0]}-${parts[1]}` : '';
}

async function loadFinanceTaxonomy() {
  const response = await fetch(TAXONOMY_PATH, { cache: 'no-store' });
  if (!response.ok) {
    throw new Error(`Could not load finance adjustment taxonomy (${response.status})`);
  }

  return parseCsv(await response.text()).map(row => ({
    primaryAspect: row['Primary Aspect'] || '',
    categoryCode: row['Category Code'] || '',
    subCategoryCode: row['Sub-Category Code'] || '',
    subCategoryName: row['Sub-Category Name'] || '',
    standardisedLabel: row['Standardised Label'] || '',
    parentCategory: row['Parent Category'] || '',
    definition: row['Definition'] || '',
  }));
}

const FinanceView = ({ rows, taxonomy, taxonomyError }) => {
  const theme = useDashboardTheme();
  const chartPalette = useMemo(() => getChartPalette(), [theme]);
  const [territory, setTerritory] = useState('');
  const [aspect, setAspect] = useState('');
  const [parentCategory, setParentCategory] = useState('');
  const [subCategoryCode, setSubCategoryCode] = useState('');

  const taxonomyLookup = useMemo(() => (
    taxonomy.reduce((lookup, item) => {
      if (item.subCategoryCode) lookup[item.subCategoryCode] = item;
      return lookup;
    }, {})
  ), [taxonomy]);

  const enrichedRows = useMemo(() => rows.map(row => {
    const taxonomyMatch = taxonomyLookup[row.subCategoryCode] || null;
    const fallbackCode = row.subCategoryCode || '';
    const fallbackCategoryCode = deriveCategoryCode(fallbackCode);

    return {
      ...row,
      categoryCode: taxonomyMatch?.categoryCode || fallbackCategoryCode,
      subCategoryName: taxonomyMatch?.subCategoryName || fallbackCode || 'Unknown',
      standardisedLabel: taxonomyMatch?.standardisedLabel || fallbackCode || 'Unclassified',
      parentCategory: taxonomyMatch?.parentCategory || (fallbackCode ? 'Mapped outside reference' : 'Unclassified'),
      definition: taxonomyMatch?.definition || row.detailedDescription || '',
      hasTaxonomy: Boolean(fallbackCode && taxonomyMatch),
    };
  }), [rows, taxonomyLookup]);

  const territories = useMemo(() => [...new Set(enrichedRows.map(r => r.territory).filter(Boolean))].sort(), [enrichedRows]);
  const aspects = useMemo(() => [...new Set(enrichedRows.map(r => r.primaryAspect).filter(Boolean))].sort(), [enrichedRows]);
  const parentCategories = useMemo(() => [...new Set(enrichedRows.map(r => r.parentCategory).filter(Boolean))].sort(), [enrichedRows]);
  const subCategories = useMemo(() => (
    [...new Set(enrichedRows.map(r => r.subCategoryCode).filter(Boolean))].sort()
  ), [enrichedRows]);

  const filtered = useMemo(() => enrichedRows.filter(r => {
    if (territory && r.territory !== territory) return false;
    if (aspect && r.primaryAspect !== aspect) return false;
    if (parentCategory && r.parentCategory !== parentCategory) return false;
    if (subCategoryCode && r.subCategoryCode !== subCategoryCode) return false;
    return true;
  }), [enrichedRows, territory, aspect, parentCategory, subCategoryCode]);

  const stats = useMemo(() => {
    const companies = new Set();
    const employees = new Set();
    const months = {};
    const aspectMap = {};
    const parentCategoryMap = {};
    let mappedCount = 0;
    let totalAbs = 0;
    let net = 0;

    filtered.forEach(r => {
      const adj = Number(r.adjustmentUsd) || 0;
      const abs = Number(r.absoluteAdjustmentUsd) || Math.abs(adj);
      totalAbs += abs;
      net += adj;
      if (r.hasTaxonomy) mappedCount += 1;
      if (r.companyId) companies.add(r.companyId);
      if (r.employeeId) employees.add(r.employeeId);

      const mk = monthKey(r.month);
      if (!months[mk]) months[mk] = { key: mk, records: 0, abs: 0, net: 0 };
      months[mk].records += 1;
      months[mk].abs += abs;
      months[mk].net += adj;

      const pa = r.primaryAspect || 'Unknown';
      if (!aspectMap[pa]) aspectMap[pa] = { records: 0, abs: 0, net: 0 };
      aspectMap[pa].records += 1;
      aspectMap[pa].abs += abs;
      aspectMap[pa].net += adj;

      const parent = r.parentCategory || 'Unclassified';
      if (!parentCategoryMap[parent]) {
        parentCategoryMap[parent] = { records: 0, abs: 0, net: 0, sampleCode: '', sampleLabel: '' };
      }
      parentCategoryMap[parent].records += 1;
      parentCategoryMap[parent].abs += abs;
      parentCategoryMap[parent].net += adj;
      if (!parentCategoryMap[parent].sampleCode && r.subCategoryCode) {
        parentCategoryMap[parent].sampleCode = r.subCategoryCode;
        parentCategoryMap[parent].sampleLabel = r.standardisedLabel || r.subCategoryName || r.subCategoryCode;
      }
    });

    return {
      totalAbs,
      net,
      companies: companies.size,
      employees: employees.size,
      mappedCount,
      unmappedCount: Math.max(filtered.length - mappedCount, 0),
      months: Object.values(months).sort((a,b) => a.key.localeCompare(b.key)),
      aspects: Object.entries(aspectMap).map(([name, value]) => ({ name, ...value })).sort((a,b) => b.abs - a.abs),
      parentCategories: Object.entries(parentCategoryMap)
        .map(([name, value]) => ({ name, ...value }))
        .sort((a,b) => b.abs - a.abs),
    };
  }, [filtered]);

  const monthlyChart = useMemo(() => ({
    type: 'bar',
    data: {
      labels: stats.months.map(m => monthLabel(m.key)),
      datasets: [
        { label: 'Records', data: stats.months.map(m => m.records), backgroundColor: chartPalette.chartBar, borderColor: chartPalette.chartBarBorder, borderWidth: 1.5, yAxisID: 'y' },
        { label: 'Abs exposure', data: stats.months.map(m => m.abs), type: 'line', borderColor: chartPalette.chartLine, backgroundColor: chartPalette.chartFill, borderWidth: 2, pointRadius: 3, fill: true, yAxisID: 'y1', tension: 0.3 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: chartPalette.chartText, font:{ family:'Poppins', size:11 } } } },
      scales: {
        x: { ticks: { color: chartPalette.chartText, font:{ family:'Poppins', size:10 } }, grid: { color: chartPalette.chartGrid } },
        y: { ticks: { color: chartPalette.chartText, font:{ family:'Poppins', size:10 } }, grid: { color: chartPalette.chartGrid } },
        y1: { position:'right', ticks: { color: chartPalette.chartText, callback: v => fmt.currency(v) }, grid: { display:false } }
      }
    }
  }), [stats, chartPalette]);

  const parentCategoryChart = useMemo(() => ({
    type: 'doughnut',
    data: {
      labels: stats.parentCategories.slice(0, 8).map(a => a.name),
      datasets: [{ data: stats.parentCategories.slice(0, 8).map(a => a.records), backgroundColor: CHART_COLORS, borderWidth: 0 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { position:'right', labels: { color: chartPalette.chartText, font:{ family:'Poppins', size:11 }, boxWidth: 12 } } }
    }
  }), [stats, chartPalette]);

  return (
    <div className="tab-content">
      <section className="page-hero compact">
        <div>
          <div className="eyebrow">Live dashboard</div>
          <h1 className="page-hero-title">Finance adjustments</h1>
          <p className="page-hero-copy">
            Review adjustment volume, exposure and operational concentration across territories, primary aspects, and taxonomy-backed sub-categories.
          </p>
        </div>
        <div className="hero-stat-block">
          <span className="status-pill live">Live</span>
          <div className="hero-stat-kicker">Data source</div>
          <div className="hero-stat-value">{FINANCE_ENV === 'local' ? 'Local mock' : 'Dashboard API'}</div>
          <div className="hero-stat-meta">{fmt.number(rows.length)} records loaded</div>
        </div>
      </section>

      <div className="section-header">
        <div>
          <h2 className="section-title">Filters</h2>
          <p className="section-sub">Narrow the live dataset by top-level aspect, taxonomy parent category, and specific sub-category codes.</p>
        </div>
        <div style={{ display:'flex', gap: 10, flexWrap:'wrap' }}>
          <select className="f-select" value={territory} onChange={e => setTerritory(e.target.value)}>
            <option value="">All territories</option>
            {territories.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
          <select className="f-select" value={aspect} onChange={e => setAspect(e.target.value)}>
            <option value="">All aspects</option>
            {aspects.map(a => <option key={a} value={a}>{a}</option>)}
          </select>
          <select className="f-select" value={parentCategory} onChange={e => setParentCategory(e.target.value)}>
            <option value="">All parent categories</option>
            {parentCategories.map(item => <option key={item} value={item}>{item}</option>)}
          </select>
          <select className="f-select" value={subCategoryCode} onChange={e => setSubCategoryCode(e.target.value)}>
            <option value="">All taxonomy codes</option>
            {subCategories.map(code => <option key={code} value={code}>{code}</option>)}
          </select>
        </div>
      </div>

      {(taxonomyError || stats.unmappedCount > 0) && (
        <div className="chart-card" style={{ paddingBottom: 16 }}>
          <div className="chart-title">Taxonomy coverage</div>
          {taxonomyError ? (
            <p style={{ color:'var(--color-error-main)', fontSize:'0.8125rem' }}>
              Taxonomy reference could not be loaded, so the page is showing live finance adjustments without taxonomy enrichment.
            </p>
          ) : (
            <p style={{ color:'var(--text-secondary)', fontSize:'0.8125rem', lineHeight:1.6 }}>
              {fmt.number(stats.mappedCount)} filtered records are mapped to the local taxonomy reference and {fmt.number(stats.unmappedCount)} remain top-level only.
            </p>
          )}
        </div>
      )}

      <div className="kpi-grid">
        <KPICard label="Records" value={fmt.number(filtered.length)} sub="Filtered adjustments" />
        <KPICard label="Absolute exposure" value={fmt.currency(stats.totalAbs)} sub="Total magnitude" />
        <KPICard label="Net exposure" value={fmt.currency(stats.net)} sign={stats.net >= 0 ? 'pos' : 'neg'} />
        <KPICard label="Avg adjustment" value={fmt.currency(filtered.length ? stats.totalAbs / filtered.length : 0)} />
        <KPICard label="Parent categories" value={fmt.number(stats.parentCategories.length)} />
        <KPICard label="Mapped rows" value={fmt.number(stats.mappedCount)} sub={`${fmt.number(stats.unmappedCount)} unmapped`} />
      </div>

      <div className="charts-row">
        <div className="chart-card" style={{ flex: 2 }}>
          <div className="chart-title">Monthly records and exposure</div>
          <ChartCanvas config={monthlyChart} />
        </div>
        <div className="chart-card" style={{ flex: 1 }}>
          <div className="chart-title">Records by parent category</div>
          <ChartCanvas config={parentCategoryChart} />
        </div>
      </div>

      <div className="chart-card">
        <div className="chart-title">Exposure by taxonomy parent category</div>
        <div className="table-wrap" style={{ marginBottom: 0 }}>
          <table className="data-table">
            <thead><tr><th>Parent category</th><th>Example taxonomy</th><th className="r">Records</th><th className="r">Abs exposure</th><th className="r">Net exposure</th><th className="r">Avg / record</th></tr></thead>
            <tbody>
              {stats.parentCategories.map(item => (
                <tr key={item.name}>
                  <td>{item.name}</td>
                  <td title={item.sampleLabel || ''}>{item.sampleCode || '---'}</td>
                  <td className="r">{fmt.number(item.records)}</td>
                  <td className="r">{fmt.currency(item.abs)}</td>
                  <td className={`r ${item.net >= 0 ? 'pos' : 'neg'}`}>{fmt.currency(item.net)}</td>
                  <td className="r">{fmt.currency(item.records ? item.abs / item.records : 0)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div className="chart-card">
        <div className="chart-title">Latest adjustment records with taxonomy detail</div>
        <div className="table-wrap" style={{ marginBottom: 0 }}>
          <table className="data-table">
            <thead><tr><th>Month</th><th>Territory</th><th>Aspect</th><th>Taxonomy code</th><th>Standardised label</th><th>Description</th><th className="r">Adjustment USD</th><th className="r">Confidence</th></tr></thead>
            <tbody>
              {filtered.slice(0, 75).map(r => (
                <tr key={`${r.month}-${r.companyId}-${r.employeeId}-${r.primaryAspect}-${r.subCategoryCode || 'na'}`}>
                  <td>{r.month}</td>
                  <td>{r.territory}</td>
                  <td>{r.primaryAspect || 'Unknown'}</td>
                  <td>{r.subCategoryCode || '---'}</td>
                  <td title={r.parentCategory || ''}>{r.standardisedLabel || 'Unclassified'}</td>
                  <td title={r.definition || r.detailedDescription || ''}>
                    {(r.definition || r.detailedDescription || '---').slice(0, 120)}
                    {(r.definition || r.detailedDescription || '').length > 120 ? '…' : ''}
                  </td>
                  <td className={`r ${(Number(r.adjustmentUsd) || 0) >= 0 ? 'pos' : 'neg'}`}>{fmt.currency(r.adjustmentUsd)}</td>
                  <td className="r">{r.confidence == null ? '---' : fmt.pct(Number(r.confidence) * 100)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [financeRows, setFinanceRows] = useState(() => readFinanceCache());
  const [loading, setLoading] = useState(() => readFinanceCache().length === 0);
  const [error, setError] = useState('');
  const [taxonomy, setTaxonomy] = useState([]);
  const [taxonomyError, setTaxonomyError] = useState('');

  useEffect(() => {
    const load = async () => {
      try {
        const cachedRows = readFinanceCache();
        const taxonomyPromise = loadFinanceTaxonomy()
          .then(rows => setTaxonomy(rows))
          .catch(err => setTaxonomyError(err.message || String(err)));

        if (cachedRows.length) {
          setFinanceRows(cachedRows);
          await taxonomyPromise;
          setLoading(false);
          return;
        }

        if (!window.dashboardApi || typeof window.dashboardApi.getFinanceAdjustments !== 'function') {
          throw new Error('The shared dashboard service is not available in the browser yet.');
        }

        // The shared service keeps the page independent from the backend shape.
        // The live finance-adjustments Edge Function can evolve without
        // scattering database-specific assumptions across the page itself.
        const finance = await window.dashboardApi.getFinanceAdjustments();
        setFinanceRows(finance);
        writeFinanceCache(finance);
        await taxonomyPromise;
      } catch (e) {
        setError(e.message || String(e));
      } finally {
        setLoading(false);
      }
    };

    load();
  }, []);

  const sidebar = { __html: window.renderSidebar('finance-adjustments') };

  return (
    <div className="shell">
      <div style={{ display:'contents' }} dangerouslySetInnerHTML={sidebar} />
      <main className="app">
        <header className="app-header">
          <div className="header-left">
            <div className="logo">Finance Adjustments</div>
            <div className="header-sub">Dedicated dashboard page · service-backed dataset</div>
          </div>
          <a className="header-link" href="index.html">Back to home</a>
        </header>
        <section className="app-main">
          {loading ? <LoadingScreen /> : error ? <ErrorScreen message={error} /> : <FinanceView rows={financeRows} taxonomy={taxonomy} taxonomyError={taxonomyError} />}
        </section>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
