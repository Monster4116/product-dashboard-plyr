<style>
  body { background: var(--bg-default); padding: 24px; overflow-y:auto; }
  .page-content { max-width:1440px; margin:0 auto; }
  .research-hero { background: linear-gradient(135deg, #5110DD 0%, #3A0B9D 58%, #36B1FF 140%); color:#fff; border-radius: var(--radius); padding:24px; margin-bottom:20px; box-shadow: var(--shadow-elevation); display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; }
  .research-hero h1 { font-size:1.5rem; line-height:1.2; margin:0 0 6px; }
  .research-hero p { color:rgba(255,255,255,.82); font-size:.8125rem; max-width:780px; margin:0; }
  .hero-badge { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.24); color:#fff; border-radius:var(--radius-chip); padding:5px 12px; font-size:.6875rem; font-weight:600; height:max-content; white-space:nowrap; }
  #nav { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:20px; }
  #nav button { padding:8px 18px; border:none; background:transparent; color:var(--text-secondary); font-size:.8125rem; font-weight:500; cursor:pointer; border-radius:var(--radius); transition:background .15s,color .15s; }
  #nav button:hover { background:var(--surface-low); color:var(--text-primary); }
  #nav button.active { background:var(--color-primary-main); color:#fff; }
  .section { display:none; }
  .section.active { display:block; }
  .card { background:var(--bg-paper); border-radius:var(--radius); padding:16px; min-width:0; box-shadow:var(--shadow-elevation); }
  .grid { display:grid; gap:16px; }
  .kpis { grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); margin-bottom:16px; }
  .two { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .card h3 { margin:0 0 10px; font-size:.9375rem; }
  .card .sub { color:var(--text-secondary); font-size:.75rem; margin-top:4px; }
  .kpi .value { font-size:1.5rem; font-weight:600; color:var(--color-primary-main); word-break:break-word; }
  .takeaway { border-left:4px solid var(--color-primary-main); background:linear-gradient(90deg,#5110DD10,#fff); }
  .chip { display:inline-flex; align-items:center; border-radius:var(--radius-chip); padding:3px 10px; font-size:.6875rem; font-weight:600; margin:2px; background:var(--surface-low); color:var(--text-secondary); white-space:nowrap; }
  .p0 { background:#F4433614; color:#B3261E; } .p1 { background:#FFA72620; color:#945700; } .p2 { background:#36B1FF18; color:#075985; } .baseline { background:#5110DD15; color:var(--color-primary-main); } .high { background:#66BB6A20; color:#1B6B28; } .medium { background:#FFA72620; color:#945700; } .low,.unknown { background:var(--surface-low); color:var(--text-secondary); }
  .chart { width:100%; height:390px; overflow:hidden; }
  .bar-chart { display:grid; gap:10px; }
  .bar-row { display:grid; grid-template-columns:150px 1fr 42px; gap:8px; align-items:center; font-size:.75rem; }
  .bar-track { height:12px; background:#5110DD12; border-radius:999px; overflow:hidden; }
  .bar-fill { height:100%; background:linear-gradient(90deg,var(--color-primary-main),var(--color-secondary-main)); border-radius:999px; }
  table { width:100%; border-collapse:collapse; font-size:.8125rem; }
  th,td { padding:10px 14px; border-bottom:1px solid var(--surface-high); text-align:left; vertical-align:top; }
  th { background:var(--surface-low); color:var(--text-secondary); font-size:.6875rem; text-transform:uppercase; letter-spacing:.06em; font-weight:500; position:sticky; top:0; z-index:1; }
  .heatmap { overflow:auto; }
  .hm-grid { display:grid; grid-template-columns:170px repeat(var(--cols),92px); min-width:max-content; }
  .hm-cell { border-right:1px solid var(--surface-high); border-bottom:1px solid var(--surface-high); padding:8px; font-size:.6875rem; min-height:44px; display:flex; align-items:center; justify-content:center; text-align:center; }
  .hm-head { background:var(--surface-low); color:var(--text-secondary); font-weight:600; position:sticky; top:0; z-index:2; }
  .hm-company { position:sticky; left:0; background:#fff; z-index:1; justify-content:flex-start; font-weight:600; }
  .m0 { background:#FFEAEA; } .m1 { background:#FFF4BD; } .m2 { background:#E7F5E5; } .m3 { background:#2D6A4F; color:#fff; } .mUnknown { background:var(--surface-low); color:var(--text-disabled); }
  .insight-card h4 { margin:0 0 8px; } .insight-card p { margin:6px 0; color:var(--text-secondary); font-size:.8125rem; }
  .empty { padding:28px; text-align:center; color:var(--text-secondary); }
  .footer-note { color:var(--text-secondary); font-size:.75rem; margin-top:16px; }
  @media(max-width:950px) { body{padding:16px} .two{grid-template-columns:1fr} .charts-row{flex-direction:column} .bar-row{grid-template-columns:110px 1fr 36px} }
</style>

function matchFilters(r){
  const tier=byId('tierFilter').value, conf=byId('confidenceFilter').value, q=byId('searchBox').value.toLowerCase();
  const entity=(entities().find(e=>e.entity_id===r.entity_id)||{});
  const tierVal=r.research_priority||entity.research_priority||'';
  const confVal=r.evidence_confidence||entity.evidence_confidence||'';
  const txt=JSON.stringify(r).toLowerCase()+JSON.stringify(entity).toLowerCase();
  return (!tier||tierVal===tier)&&(!conf||confVal===conf)&&(!q||txt.includes(q));
}
function init(){
  byId('nav').innerHTML=PAGES.map(([id,title])=>`<button data-page="${id}" class="${id==='overview'?'active':''}">${title}</button>`).join('');
  byId('nav').addEventListener('click',e=>{ if(e.target.dataset.page) showPage(e.target.dataset.page); });
  [...new Set(entities().map(e=>e.research_priority).filter(Boolean))].forEach(v=>byId('tierFilter').innerHTML+=`<option>${esc(v)}</option>`);
  ['High','Medium','Low','Unknown'].forEach(v=>byId('confidenceFilter').innerHTML+=`<option>${v}</option>`);
  ['tierFilter','confidenceFilter','searchBox'].forEach(id=>byId(id).addEventListener('input',renderAll));
  renderAll();
}
function showPage(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); byId(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
  const p=PAGES.find(x=>x[0]===id); byId('pageTitle').textContent=p[1]; byId('pageSub').textContent=p[2];
}
function clearFilters(){byId('tierFilter').value='';byId('confidenceFilter').value='';byId('searchBox').value='';renderAll();}
function kpi(title,value,sub){return `<div class="card kpi"><h3>${title}</h3><div class="value">${esc(value)}</div><div class="sub">${esc(sub||'')}</div></div>`}
function topRows(metric,n=8){ return compRows().sort((a,b)=>(num(b[metric])||-1)-(num(a[metric])||-1)).slice(0,n); }
function barChart(rows, metric){ const max=Math.max(100,...rows.map(r=>num(r[metric])||0)); return `<div class="bar-chart">${rows.map(r=>`<div class="bar-row"><b>${esc(r.company)}</b><div class="bar-track"><div class="bar-fill" style="width:${((num(r[metric])||0)/max)*100}%"></div></div><span>${esc(r[metric])}</span></div>`).join('')}</div>`; }
function scatter(rows,xKey,yKey,sizeKey,label){
  const xs=rows.map(r=>num(r[xKey])).filter(v=>v!=null), ys=rows.map(r=>num(r[yKey])).filter(v=>v!=null);
  const minX=Math.min(...xs,0), maxX=Math.max(...xs,100), minY=Math.min(...ys,0), maxY=Math.max(...ys,100);
  const w=780,h=360,p=45; const X=x=>p+((x-minX)/(maxX-minX||1))*(w-p*2); const Y=y=>h-p-((y-minY)/(maxY-minY||1))*(h-p*2);
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" role="img" aria-label="${esc(label)}">
    <line x1="${p}" y1="${h-p}" x2="${w-p}" y2="${h-p}" stroke="#d8d2e8"/><line x1="${p}" y1="${p}" x2="${p}" y2="${h-p}" stroke="#d8d2e8"/>
    <text x="${w/2}" y="${h-8}" text-anchor="middle" font-size="12" fill="#49454F">${esc(xKey.replaceAll('_',' '))}</text>
    <text x="12" y="${h/2}" transform="rotate(-90 12 ${h/2})" text-anchor="middle" font-size="12" fill="#49454F">${esc(yKey.replaceAll('_',' '))}</text>
    ${rows.map(r=>{const x=num(r[xKey]),y=num(r[yKey]); if(x==null||y==null)return ''; const s=7+(num(r[sizeKey])||50)/10; const isBase=r.role==='Baseline'; return `<g><circle cx="${X(x)}" cy="${Y(y)}" r="${s}" fill="${isBase?'#5110DD':'#36B1FF'}" opacity="${r.evidence_confidence==='High'?'.86':'.52'}" stroke="${isBase?'#1D1B20':'#fff'}" stroke-width="2"><title>${esc(r.company)} — ${xKey}: ${x}, ${yKey}: ${y}</title></circle><text x="${X(x)+s+3}" y="${Y(y)+4}" font-size="10" fill="#1D1B20">${esc(r.company)}</text></g>`}).join('')}
  </svg>`;
}
function table(rows, cols){ if(!rows.length) return `<div class="empty">No matching data.</div>`; return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${esc(c.label||c)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>{let k=c.key||c,v=r[k]; if(c.chip) return `<td>${chip(v,v)}</td>`; return `<td>${esc(v)}</td>`}).join('')}</tr>`).join('')}</tbody></table></div>`; }
function renderOverview(){
  const rows=compRows(), base=scoring().find(r=>r.role==='Baseline');
  const topPeer=topRows('closest_peer_score',1)[0]||{}, topThreat=topRows('competitive_threat_score',1)[0]||{}, topBench=topRows('category_benchmark_score',1)[0]||{};
  const p0=entities().filter(e=>e.research_priority==='P0').length, p1=entities().filter(e=>e.research_priority==='P1').length, p2=entities().filter(e=>e.research_priority==='P2').length;
  byId('overview').innerHTML=`<div class="grid kpis">
    ${kpi('Companies analyzed',entities().filter(e=>!['Baseline','Excluded'].includes(e.research_priority)).length,'Active competitor / benchmark universe')}
    ${kpi('P0 / P1 / P2',`${p0} / ${p1} / ${p2}`,'Priority tiers preserved')}
    ${kpi('Closest peer',topPeer.company||'Unknown',`Closest Peer Score: ${topPeer.closest_peer_score||'Unknown'}`)}
    ${kpi('Highest threat',topThreat.company||'Unknown',`Threat Score: ${topThreat.competitive_threat_score||'Unknown'}`)}
    ${kpi('Top benchmark',topBench.company||'Unknown',`Benchmark Score: ${topBench.category_benchmark_score||'Unknown'}`)}
    ${kpi('Dashboard readiness',DB.metadata.dashboard_readiness_score+' / 100','From source database metadata')}
  </div>
  <div class="grid two">
    <div class="card takeaway"><h3>Executive takeaway</h3><p><b>Signal:</b> Closest peer, competitive threat, and category benchmark rankings diverge. <b>Meaning:</b> use Multiplier/Oyster/RemoFirst for realistic peer benchmarking, while tracking Deel/Rippling/G-P for market expectation pressure. <b>Action:</b> prioritize pricing and packaging teardown next.</p></div>
    <div class="card"><h3>Top closest peers</h3>${barChart(topRows('closest_peer_score',6),'closest_peer_score')}</div>
  </div>`;
}
function renderMarket(){
  const rows=[...scoring().filter(r=>r.role==='Baseline'),...compRows()];
  byId('market').innerHTML=`<div class="grid two"><div class="card"><h3>Market Position Grid</h3>${scatter(rows,'customer_satisfaction_index','market_presence_index','product_breadth_score','Market grid')}</div><div class="card"><h3>Peer vs Threat Matrix</h3>${scatter(rows,'closest_peer_score','competitive_threat_score','category_benchmark_score','Peer threat matrix')}</div></div><div class="card" style="margin-top:16px"><h3>Scoring Detail</h3>${table(rows,[{key:'company',label:'Company'},{key:'role',label:'Role',chip:true},{key:'research_priority',label:'Tier',chip:true},'market_presence_index','customer_satisfaction_index','product_breadth_score','closest_peer_score','competitive_threat_score','category_benchmark_score',{key:'evidence_confidence',label:'Confidence',chip:true}])}</div>`;
}
function renderPeers(){
  byId('peers').innerHTML=`<div class="grid two"><div class="card"><h3>Closest Peer Ranking</h3>${barChart(topRows('closest_peer_score',10),'closest_peer_score')}</div><div class="card takeaway"><h3>How to read this</h3><p>Closest Peer Score intentionally avoids rewarding scale. This prevents Deel and Rippling from being treated as Playroll’s best roadmap comparators simply because they are large.</p>${table(topRows('closest_peer_score',5),['company','closest_peer_score','playroll_similarity_score','pricing_transparency_score','scoring_notes'])}</div></div>`;
}
function renderThreats(){
  byId('threats').innerHTML=`<div class="grid two"><div class="card"><h3>Competitive Threat Ranking</h3>${barChart(topRows('competitive_threat_score',10),'competitive_threat_score')}</div><div class="card"><h3>Category Benchmark Ranking</h3>${barChart(topRows('category_benchmark_score',10),'category_benchmark_score')}</div></div>`;
}
function renderFeatures(){
  const companies=[...new Set(T.feature_capabilities.map(r=>r.company_name))].filter(c=>!byId('searchBox').value||c.toLowerCase().includes(byId('searchBox').value.toLowerCase())).slice(0,12);
  const feats=[...new Set(T.feature_capabilities.map(r=>r.feature_name))];
  let cells=`<div class="hm-cell hm-head hm-company">Company</div>`+feats.map(f=>`<div class="hm-cell hm-head">${esc(f)}</div>`).join('');
  companies.forEach(c=>{cells+=`<div class="hm-cell hm-company">${esc(c)}</div>`; feats.forEach(f=>{const r=T.feature_capabilities.find(x=>x.company_name===c&&x.feature_name===f); const m=r?String(r.maturity_score):'Unknown'; cells+=`<div class="hm-cell m${esc(m)}" title="${esc((r&&r.maturity_label)||'Unknown')}">${esc(m)}</div>`;});});
  byId('features').innerHTML=`<div class="card takeaway"><h3>Feature Heatmap</h3><p>Scores use the 0–3 maturity convention: 0 = no evidence, 1 = announced/partial, 2 = production, 3 = mature/core differentiator. Low-confidence and unknown values are retained rather than hidden.</p></div><div class="card heatmap" style="margin-top:16px"><div class="hm-grid" style="--cols:${feats.length}">${cells}</div></div>`;
}
function renderPricing(){
  const scoreBy=Object.fromEntries(scoring().map(r=>[r.entity_id,r]));
  const rows=(T.pricing||[]).filter(r=>matchFilters({...r, research_priority:(scoreBy[r.entity_id]||{}).research_priority, evidence_confidence:r.evidence_confidence}));
  const chartRows=rows.map(r=>({...r, product_breadth_score:(scoreBy[r.entity_id]||{}).product_breadth_score, market_presence_index:(scoreBy[r.entity_id]||{}).market_presence_index})).filter(r=>num(r.eor_price_usd_pm)!=null);
  byId('pricing').innerHTML=`<div class="grid two"><div class="card"><h3>Pricing vs Product Breadth</h3>${scatter(chartRows,'eor_price_usd_pm','product_breadth_score','market_presence_index','Pricing breadth')}</div><div class="card takeaway"><h3>Pricing caveat</h3><p>Unknown or quote-based pricing is not plotted as zero. Use the table to track pricing transparency and validation gaps.</p></div></div><div class="card" style="margin-top:16px"><h3>Pricing Table</h3>${table(rows,['company','product','pricing_model','eor_price_usd_pm','contractor_price_usd_pm','payroll_price_usd_pepm',{key:'pricing_transparency_score',label:'Transparency'},'price_position','pricing_implication',{key:'evidence_confidence',label:'Confidence',chip:true}])}</div>`;
}
function renderSentiment(){
  const rows=(T.customer_sentiment||[]).filter(r=>!byId('searchBox').value||JSON.stringify(r).toLowerCase().includes(byId('searchBox').value.toLowerCase()));
  byId('sentiment').innerHTML=`<div class="grid two"><div class="card"><h3>Rating vs Review Count</h3>${scatter(rows,'review_count','review_rating','normalized_sentiment_score','Sentiment')}</div><div class="card"><h3>Top Sentiment Signals</h3>${table(rows,['company','review_rating','review_count','sentiment_theme','common_praise','common_complaint',{key:'evidence_confidence',label:'Confidence',chip:true}])}</div></div>`;
}
function renderInsights(){
  const q=byId('searchBox').value.toLowerCase();
  const rows=(T.structured_insights||[]).filter(r=>!q||JSON.stringify(r).toLowerCase().includes(q));
  byId('insights').innerHTML=`<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))">${rows.map(r=>`<div class="card insight-card"><h4>${esc(r.theme)}</h4>${chip(r.confidence,r.confidence)} ${chip(r.strategic_impact,'p0')}<p><b>Signal:</b> ${esc(r.evidence_signal)}</p><p><b>Meaning:</b> ${esc(r.strategic_meaning)}</p><p><b>Action:</b> ${esc(r.recommended_follow_up)}</p></div>`).join('')}</div>`;
}
function renderQuality(){
  byId('quality').innerHTML=`<div class="grid kpis">${kpi('Database readiness',DB.metadata.database_readiness_score+' / 100','Source metadata')}${kpi('Dashboard readiness',DB.metadata.dashboard_readiness_score+' / 100','Source metadata')}${kpi('Open research gaps',(T.research_gaps||[]).filter(g=>g.status==='Open').length,'Needs validation')}${kpi('Sources',(T.sources||[]).length,'Source rows retained')}</div><div class="grid two"><div class="card"><h3>Open Research Gaps</h3>${table(T.research_gaps||[],['company','missing_data','impact_on_analysis','suggested_follow_up','status'])}</div><div class="card"><h3>Validation Checks</h3>${table((T.validation_checks||[]).slice(0,60),['check_id','check_name','status','severity','notes'])}</div></div><div class="card" style="margin-top:16px"><h3>Sources</h3>${table(T.sources||[],['source_id','company','source_title','domain','source_type','data_used','reliability'])}</div>`;
}
function renderExplorer(){
  const names=Object.keys(T); const selected=byId('tableSelect')?.value || names[0]; const rows=T[selected]||[]; const cols=rows[0]?Object.keys(rows[0]).slice(0,14):[];
  byId('explorer').innerHTML=`<div class="card"><h3>Data Explorer</h3><select id="tableSelect" onchange="renderExplorer()">${names.map(n=>`<option ${n===selected?'selected':''}>${esc(n)}</option>`).join('')}</select><p class="sub">${rows.length} rows. Showing first 14 columns for readability.</p>${table(rows,cols)}</div>`;
}
function renderAll(){renderOverview();renderMarket();renderPeers();renderThreats();renderFeatures();renderPricing();renderSentiment();renderInsights();renderQuality();renderExplorer();}
init();
document.getElementById('readinessBadge').textContent = 'Dashboard readiness ' + (DB.metadata?.dashboard_readiness_score || 'Unknown') + ' / 100';
</script>
