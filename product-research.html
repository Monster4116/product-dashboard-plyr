<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* ── Page-specific styles for Product Research ── */
  body {
    background: var(--bg-default);
    padding: 24px;
  }

  .page-content {
    max-width: 1440px;
    margin: 0 auto;
  }

  /* ── Empty state placeholder — remove once content is added ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    gap: 16px;
  }

  .empty-state-icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: #5110DD12;
    color: var(--color-primary-main);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-state-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .empty-state-sub {
    font-size: 0.875rem;
    color: var(--text-secondary);
    max-width: 420px;
    line-height: 1.6;
  }

  .empty-state-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #FFA72615;
    border: 1px solid #FFA72640;
    border-radius: var(--radius-chip);
    padding: 4px 14px;
    font-size: 0.6875rem;
    font-weight: 600;
    color: #BA7517;
    letter-spacing: .04em;
  }
</style>
</head>
<body>

<div class="page-content">

  <!--
  ═══════════════════════════════════════════════════════════════
  PRODUCT RESEARCH PAGE
  ═══════════════════════════════════════════════════════════════

  This file is independently maintained in GitHub.
  You can freely edit this file without touching index.html.

  The Playroll design tokens (colours, fonts, spacing) are
  loaded automatically from styles.css.

  QUICK-START GUIDE
  ─────────────────
  • Use class="chart-card" for white content cards with shadow
  • Use class="kpi-grid" for a responsive KPI card row
  • Use class="section-title" / "section-sub" for headings
  • Use class="data-table" inside a "table-wrap" for tables
  • Use class="filter-panel" for filter/control bars
  • All Playroll CSS variables are available: var(--color-primary-main), etc.

  Delete the <div class="empty-state"> block below once you
  start adding real content.
  ═══════════════════════════════════════════════════════════════
  -->

  <!-- ── Page header ── -->
  <div class="section-header" style="margin-bottom: 28px;">
    <div>
      <h1 class="section-title" style="font-size: 1.25rem;">Product Research</h1>
      <p class="section-sub">Insights and research to inform the Playroll product roadmap.</p>
    </div>
    <!-- Add controls / filters here if needed -->
  </div>

  <!-- ── Empty state — replace with real content ── -->
  <div class="empty-state">
    <div class="empty-state-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </div>

    <div class="empty-state-badge">
      <span style="width:6px;height:6px;border-radius:50%;background:#FFA726;display:inline-block;"></span>
      CONTENT COMING SOON
    </div>

    <div class="empty-state-title">Product Research</div>
    <p class="empty-state-sub">
      This page is ready for content. Edit <code style="background:var(--surface-low);padding:2px 6px;border-radius:4px;font-size:0.8125rem;">product-research.html</code> in GitHub to add sections, charts, tables, or any other content — without touching the main dashboard.
    </p>
  </div>

  <!-- ════════════════════════════════════════════════
  START ADDING CONTENT BELOW THIS LINE
  Example section structure:

  <div class="chart-card">
    <div class="section-header">
      <div>
        <h2 class="section-title">Section title</h2>
        <p class="section-sub">Supporting description</p>
      </div>
    </div>
    <p style="color: var(--text-secondary);">Content goes here.</p>
  </div>

  ════════════════════════════════════════════════ -->

</div>

</body>
</html>
