<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const PRODUCT_NEWS_ENV = window.__PUBLIC_CONFIG__?.appEnv ?? 'local';
const PRODUCT_NEWS_CACHE_KEY = `dashboard.product-news.rows.v1.${PRODUCT_NEWS_ENV}`;
const CHART_COLORS = ['#5110DD', '#36B1FF', '#66BB6A', '#FFA726', '#AF91EF', '#F44336', '#29B6F6', '#A3DBFF'];

const CATEGORY_META = {
  industry_regulatory: { label: 'Industry / Regulatory', tone: 'regulatory' },
  competitor_moves: { label: 'Competitor Moves', tone: 'competitor' },
  competitor_funding: { label: 'Competitor Funding', tone: 'competitor' },
  competitor_reviews: { label: 'Competitor Reviews', tone: 'competitor' },
  ai_model_releases: { label: 'AI Model Releases', tone: 'ai' },
  ai_tools_hr: { label: 'AI Tools for HR', tone: 'ai' },
  pm_tooling: { label: 'PM Tooling', tone: 'pm' },
  market_intelligence: { label: 'Market Intelligence', tone: 'general' },
};

const fmt = {
  number: n => new Intl.NumberFormat('en-US').format(Math.round(Number(n) || 0)),
  date: value => {
    if (!value) return '---';
    const parsed = new Date(value.includes('T') ? value : `${value}T00:00:00`);
    return Number.isNaN(parsed.getTime())
      ? value
      : parsed.toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'2-digit' });
  },
};

const getCategoryMeta = category => CATEGORY_META[category] || { label: 'General', tone: 'general' };
const getRowDate = row => row.itemDate || row.researchedAt || '';
const toDateValue = value => {
  if (!value) return 0;
  const parsed = new Date(value.includes('T') ? value : `${value}T00:00:00`);
  return Number.isNaN(parsed.getTime()) ? 0 : parsed.getTime();
};

const useDashboardTheme = () => {
  const [theme, setTheme] = useState(() => window.getDashboardTheme ? window.getDashboardTheme() : 'light');

  useEffect(() => {
    const handleThemeChange = event => {
      setTheme(event.detail?.theme || (window.getDashboardTheme ? window.getDashboardTheme() : 'light'));
    };

    window.addEventListener('dashboard-theme-change', handleThemeChange);
    return () => window.removeEventListener('dashboard-theme-change', handleThemeChange);
  }, []);

  return theme;
};

const getChartPalette = () => (
  window.getDashboardThemePalette
    ? window.getDashboardThemePalette()
    : {
        chartText: '#49454F',
        chartGrid: '#E9E9EA',
        chartBar: '#5110DDAA',
        chartBarBorder: '#5110DD',
      }
);

function readProductNewsCache() {
  try {
    const raw = sessionStorage.getItem(PRODUCT_NEWS_CACHE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (_) {
    return [];
  }
}

function writeProductNewsCache(rows) {
  try {
    sessionStorage.setItem(PRODUCT_NEWS_CACHE_KEY, JSON.stringify(rows));
  } catch (_) {
    // Ignore storage failures; the page can still run off fresh API data.
  }
}

const ChartCanvas = ({ config, height = 260 }) => {
  const ref = useRef(null);
  const chart = useRef(null);

  useEffect(() => {
    if (!ref.current || !config) return;
    if (chart.current) chart.current.destroy();
    chart.current = new Chart(ref.current, config);
    return () => chart.current && chart.current.destroy();
  }, [config]);

  return <canvas ref={ref} style={{ height, maxHeight: height }} />;
};

const LoadingScreen = () => (
  <div className="center-screen">
    <div className="spinner" />
    <p style={{ color:'var(--text-secondary)', fontSize:'0.8125rem' }}>Loading product news…</p>
  </div>
);

const ErrorScreen = ({ message }) => (
  <div className="center-screen">
    <div className="err-title">Failed to load product news</div>
    <div className="err-msg">{message}</div>
    <div className="err-msg" style={{ marginTop: 8 }}>
      This page reads the research feed through the shared dashboard service so the UI stays independent from the raw table structure.
    </div>
  </div>
);

const EmptyScreen = () => (
  <div className="center-screen">
    <div className="err-title">No product news found</div>
    <div className="err-msg">The shared dashboard service returned an empty research feed.</div>
  </div>
);

const KPICard = ({ label, value, sub }) => (
  <div className="kpi-card">
    <div className="kpi-label">{label}</div>
    <div className="kpi-value">{value}</div>
    {sub && <div className="kpi-sub">{sub}</div>}
  </div>
);

const CategoryBadge = ({ category }) => {
  const meta = getCategoryMeta(category);
  return <span className={`category-badge ${meta.tone}`}>{meta.label}</span>;
};

const NewsGraphic = ({ category }) => {
  const meta = getCategoryMeta(category);
  const toneClass = meta.tone || 'general';

  const iconByCategory = {
    regulatory: (
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 3L18.5 5.7V11.8C18.5 16.1 15.7 19.9 12 21C8.3 19.9 5.5 16.1 5.5 11.8V5.7L12 3Z" fill="currentColor" opacity="0.18"/>
        <path d="M12 4.8L17 6.8V11.6C17 14.8 15.1 17.5 12 18.5C8.9 17.5 7 14.8 7 11.6V6.8L12 4.8Z" stroke="currentColor" strokeWidth="1.8"/>
        <path d="M9.7 11.9L11.2 13.4L14.6 10" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    ),
    competitor: (
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M5 16L9 12L12 15L18 9" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        <path d="M14.5 9H18V12.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="6.5" cy="16.5" r="2" fill="currentColor" opacity="0.22"/>
      </svg>
    ),
    ai: (
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 4L13.8 9.2L19 11L13.8 12.8L12 18L10.2 12.8L5 11L10.2 9.2L12 4Z" fill="currentColor" opacity="0.18"/>
        <path d="M12 4L13.8 9.2L19 11L13.8 12.8L12 18L10.2 12.8L5 11L10.2 9.2L12 4Z" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/>
      </svg>
    ),
    pm: (
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <rect x="4" y="5" width="16" height="14" rx="3" stroke="currentColor" strokeWidth="1.8"/>
        <path d="M8 9H16" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
        <path d="M8 13H12" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
        <path d="M15 13H16" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
      </svg>
    ),
    general: (
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="8" stroke="currentColor" strokeWidth="1.8"/>
        <path d="M12 8V12L14.8 14.4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    ),
  };

  return (
    <span className={`story-icon ${toneClass}`} aria-hidden="true">
      {iconByCategory[toneClass] || iconByCategory.general}
    </span>
  );
};

const StorySpotlightCard = ({ row }) => (
  <article className="story-spotlight-card">
    <div className="story-spotlight-head">
      <div style={{ display:'flex', gap: 12, alignItems:'flex-start' }}>
        <NewsGraphic category={row.category} />
        <div>
          <CategoryBadge category={row.category} />
          <h3 className="story-spotlight-title" style={{ marginTop: 10 }}>{row.headline}</h3>
        </div>
      </div>
      <span className="news-pill">{fmt.date(getRowDate(row))}</span>
    </div>

    <div className="news-card-meta">
      {row.actor && <span className="news-pill">{row.actor}</span>}
      {row.descriptor && <span className="news-pill">{row.descriptor}</span>}
      {row.sourceDomain && <span className="news-pill">{row.sourceDomain}</span>}
    </div>

    <p className="story-spotlight-summary">{row.summary || 'No summary available for this item yet.'}</p>

    <div className="story-spotlight-footer">
      <span className="news-pill">{row.runType || 'daily'}</span>
      {row.sourceUrl ? (
        <a className="news-link" href={row.sourceUrl} target="_blank" rel="noreferrer noopener">Open source</a>
      ) : (
        <span className="news-pill">No source link</span>
      )}
    </div>
  </article>
);

const NewsFeedItem = ({ row }) => {
  const [expanded, setExpanded] = useState(false);

  const detailCards = [
    row.actorType && { label: 'Actor type', value: row.actorType },
    row.descriptor && { label: 'Signal tag', value: row.descriptor },
    row.sourceDomain && { label: 'Source domain', value: row.sourceDomain },
    row.researchedAt && { label: 'Researched at', value: fmt.date(row.researchedAt) },
    row.runType && { label: 'Run type', value: row.runType },
    row.sentiment && { label: 'Sentiment', value: row.sentiment },
    row.region && { label: 'Region', value: row.region },
    row.eventType && { label: 'Event type', value: row.eventType },
    row.stage && { label: 'Funding stage', value: row.stage },
    row.amount && { label: 'Amount', value: row.amount },
    row.investors && { label: 'Investors', value: row.investors },
  ].filter(Boolean);

  const hasExtraDetail = Boolean(row.insight) || detailCards.length > 0;

  return (
    <article className="feed-item">
      <div className="feed-item-head">
        <div className="feed-item-main">
          <NewsGraphic category={row.category} />
          <div className="feed-item-body">
            <div className="feed-item-topline">
              <h3 className="feed-item-title">{row.headline}</h3>
            </div>

            <div className="feed-item-meta">
              <CategoryBadge category={row.category} />
              {row.actor && <span className="news-pill">{row.actor}</span>}
              {row.descriptor && <span className="news-pill">{row.descriptor}</span>}
              {row.sourceDomain && <span className="news-pill">{row.sourceDomain}</span>}
            </div>

            <p className="feed-item-summary">{row.summary || 'No summary available for this item yet.'}</p>
          </div>
        </div>

        <div className="feed-item-side">
          <span className="news-pill">{fmt.date(getRowDate(row))}</span>
          <div className="feed-item-actions">
            {hasExtraDetail && (
              <button className="feed-item-toggle" type="button" onClick={() => setExpanded(value => !value)}>
                {expanded ? 'Hide details' : 'More detail'}
              </button>
            )}
            {row.sourceUrl ? (
              <a className="feed-item-link" href={row.sourceUrl} target="_blank" rel="noreferrer noopener">Open source</a>
            ) : (
              <span className="news-pill">No source link</span>
            )}
          </div>
        </div>
      </div>

      {expanded && hasExtraDetail && (
        <div className="feed-item-details">
          {detailCards.map(card => (
            <div key={`${row.id}-${card.label}`} className="feed-detail-card">
              <span className="feed-detail-label">{card.label}</span>
              <div className="feed-detail-value">{card.value}</div>
            </div>
          ))}

          {row.insight && (
            <div className="feed-detail-card feed-item-insight">
              <span className="feed-detail-label">Why it matters</span>
              <div className="feed-detail-value">{row.insight}</div>
            </div>
          )}
        </div>
      )}
    </article>
  );
};

const ProductNewsView = ({ rows }) => {
  const theme = useDashboardTheme();
  const chartPalette = useMemo(() => getChartPalette(), [theme]);
  const [activeTab, setActiveTab] = useState('overview');
  const [category, setCategory] = useState('');
  const [actor, setActor] = useState('');
  const [query, setQuery] = useState('');

  const categories = useMemo(() => (
    [...new Set(rows.map(row => row.category).filter(Boolean))]
      .map(value => ({ value, label: getCategoryMeta(value).label }))
      .sort((a, b) => a.label.localeCompare(b.label))
  ), [rows]);

  const actors = useMemo(() => (
    [...new Set(rows.map(row => row.actor).filter(Boolean))].sort((a, b) => a.localeCompare(b))
  ), [rows]);

  const filtered = useMemo(() => {
    const needle = query.trim().toLowerCase();

    return rows
      .filter(row => {
        if (category && row.category !== category) return false;
        if (actor && row.actor !== actor) return false;
        if (!needle) return true;

        return [
          row.headline,
          row.actor,
          row.summary,
          row.insight,
          row.sourceDomain,
          row.descriptor,
        ].some(value => String(value || '').toLowerCase().includes(needle));
      })
      .sort((a, b) => toDateValue(getRowDate(b)) - toDateValue(getRowDate(a)));
  }, [rows, category, actor, query]);

  const stats = useMemo(() => {
    const uniqueActors = new Set();
    const uniqueDomains = new Set();
    const categoryCounts = {};
    const dateCounts = {};
    const actorCounts = {};
    let latestDate = '';

    filtered.forEach(row => {
      if (row.actor) {
        uniqueActors.add(row.actor);
        actorCounts[row.actor] = (actorCounts[row.actor] || 0) + 1;
      }

      if (row.sourceDomain) uniqueDomains.add(row.sourceDomain);

      const categoryLabel = getCategoryMeta(row.category).label;
      categoryCounts[categoryLabel] = (categoryCounts[categoryLabel] || 0) + 1;

      const dateKey = getRowDate(row) || 'Unknown';
      dateCounts[dateKey] = (dateCounts[dateKey] || 0) + 1;

      const sortDate = getRowDate(row);
      if (sortDate && (!latestDate || toDateValue(sortDate) > toDateValue(latestDate))) {
        latestDate = sortDate;
      }
    });

    const topCategories = Object.entries(categoryCounts)
      .map(([label, count]) => ({ label, count }))
      .sort((a, b) => b.count - a.count);

    const topActors = Object.entries(actorCounts)
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 6);

    const recentDates = Object.entries(dateCounts)
      .map(([date, count]) => ({ date, count }))
      .filter(item => item.date !== 'Unknown')
      .sort((a, b) => toDateValue(a.date) - toDateValue(b.date))
      .slice(-8);

    const topSources = filtered
      .filter(row => row.sourceDomain)
      .reduce((accumulator, row) => {
        accumulator[row.sourceDomain] = (accumulator[row.sourceDomain] || 0) + 1;
        return accumulator;
      }, {});

    const sourceLeaders = Object.entries(topSources)
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count)
      .slice(0, 6);

    return {
      totalItems: filtered.length,
      categoryCount: topCategories.length,
      actorCount: uniqueActors.size,
      sourceCount: uniqueDomains.size,
      latestDate,
      topCategories,
      topActors,
      recentDates,
      sourceLeaders,
    };
  }, [filtered]);

  const categoryChart = useMemo(() => ({
    type: 'doughnut',
    data: {
      labels: stats.topCategories.map(item => item.label),
      datasets: [{
        data: stats.topCategories.map(item => item.count),
        backgroundColor: CHART_COLORS,
        borderWidth: 0,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: chartPalette.chartText, font:{ family:'Poppins', size:11 }, boxWidth: 12 },
        },
      },
    },
  }), [stats, chartPalette]);

  const timelineChart = useMemo(() => ({
    type: 'bar',
    data: {
      labels: stats.recentDates.map(item => fmt.date(item.date)),
      datasets: [{
        label: 'Items',
        data: stats.recentDates.map(item => item.count),
        backgroundColor: chartPalette.chartBar,
        borderColor: chartPalette.chartBarBorder,
        borderWidth: 1.5,
        borderRadius: 8,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
      },
      scales: {
        x: { ticks: { color: chartPalette.chartText, font:{ family:'Poppins', size:10 } }, grid: { display: false } },
        y: { ticks: { color: chartPalette.chartText, font:{ family:'Poppins', size:10 }, precision: 0 }, grid: { color: chartPalette.chartGrid } },
      },
    },
  }), [stats, chartPalette]);

  const topStories = useMemo(() => filtered.slice(0, 3), [filtered]);
  const feedRows = useMemo(() => filtered, [filtered]);

  return (
    <div className="tab-content">
      <section className="page-hero compact">
        <div>
          <div className="eyebrow">Live dashboard</div>
          <h1 className="page-hero-title">Product news</h1>
          <p className="page-hero-copy">
            Scan the latest product, AI, competitor and regulatory signals in one readable research feed, then jump directly to the source in a new tab when you want to go deeper.
          </p>
        </div>
        <div className="hero-stat-block">
          <span className="status-pill live">Live</span>
          <div className="hero-stat-kicker">Data source</div>
          <div className="hero-stat-value">{PRODUCT_NEWS_ENV === 'local' ? 'Local mock' : 'Dashboard API'}</div>
          <div className="hero-stat-meta">{fmt.number(rows.length)} research items loaded</div>
        </div>
      </section>

      <section className="info-strip">
        <div className="info-strip-item">
          <span className="info-strip-label">Current feed scope</span>
          <span className="info-strip-value">Competitors, AI, PM, market intelligence and regulatory changes</span>
        </div>
        <div className="info-strip-item">
          <span className="info-strip-label">Link behavior</span>
          <span className="info-strip-value">Every source link opens in a new tab for quick review</span>
        </div>
        <div className="info-strip-item">
          <span className="info-strip-label">Best use</span>
          <span className="info-strip-value">Fast scanning, filtering and deeper source follow-up</span>
        </div>
      </section>

      <div className="product-news-tabs">
        <div>
          <h2 className="section-title">Product news views</h2>
          <p className="product-news-tabs-copy">Start with a simple overview for quick pattern reading, then switch into the full feed when you want to scan individual stories in detail.</p>
        </div>
        <div className="tab-nav" role="tablist" aria-label="Product news views">
          <button className={`tab-btn ${activeTab === 'overview' ? 'active' : ''}`} type="button" onClick={() => setActiveTab('overview')}>Overview</button>
          <button className={`tab-btn ${activeTab === 'feed' ? 'active' : ''}`} type="button" onClick={() => setActiveTab('feed')}>Newsfeed</button>
        </div>
      </div>

      <div className="section-header">
        <div>
          <h2 className="section-title">Filters</h2>
          <p className="section-sub">Filter the current feed by category, actor or keyword search across headlines, summaries and insights.</p>
        </div>
        <div style={{ display:'flex', gap: 10, flexWrap:'wrap' }}>
          <select className="f-select" value={category} onChange={e => setCategory(e.target.value)}>
            <option value="">All categories</option>
            {categories.map(item => <option key={item.value} value={item.value}>{item.label}</option>)}
          </select>
          <select className="f-select" value={actor} onChange={e => setActor(e.target.value)}>
            <option value="">All actors</option>
            {actors.map(item => <option key={item} value={item}>{item}</option>)}
          </select>
          <input
            className="f-select"
            type="search"
            placeholder="Search headlines, summaries or insights"
            value={query}
            onChange={e => setQuery(e.target.value)}
            style={{ minWidth: 260 }}
          />
        </div>
      </div>

      <div className="kpi-grid">
        <KPICard label="Items" value={fmt.number(stats.totalItems)} sub="Filtered feed items" />
        <KPICard label="Categories" value={fmt.number(stats.categoryCount)} />
        <KPICard label="Actors" value={fmt.number(stats.actorCount)} />
        <KPICard label="Sources" value={fmt.number(stats.sourceCount)} />
        <KPICard label="Latest item date" value={fmt.date(stats.latestDate)} />
        <KPICard label="Top stories" value={fmt.number(topStories.length)} sub="Featured in the overview" />
      </div>

      {activeTab === 'overview' ? (
        <>
          <div className="charts-row">
            <div className="chart-card" style={{ flex: 1 }}>
              <div className="chart-title">Items by category</div>
              {stats.topCategories.length ? <ChartCanvas config={categoryChart} /> : <div className="no-data">No category data for the current filters.</div>}
            </div>
            <div className="chart-card" style={{ flex: 2 }}>
              <div className="chart-title">Recent item cadence</div>
              {stats.recentDates.length ? <ChartCanvas config={timelineChart} /> : <div className="no-data">No dated items available for the current filters.</div>}
            </div>
          </div>

          <div className="section-header">
            <div>
              <h2 className="section-title">Top stories</h2>
              <p className="section-sub">Three fast-read stories from the current filtered view, ready for source follow-up.</p>
            </div>
          </div>

          {topStories.length ? (
            <section className="story-spotlight-grid">
              {topStories.map(row => <StorySpotlightCard key={row.id} row={row} />)}
            </section>
          ) : (
            <div className="chart-card">
              <div className="no-data">No product news items match the current filters.</div>
            </div>
          )}
        </>
      ) : (
        <>
          <div className="section-header">
            <div>
              <h2 className="section-title">Newsfeed</h2>
              <p className="section-sub">A readable vertical feed with quick tags, visible summaries and optional deeper context when you want it.</p>
            </div>
            <span className="header-link static">{fmt.number(feedRows.length)} stories in view</span>
          </div>

          {feedRows.length ? (
            <section className="feed-list">
              {feedRows.map(row => <NewsFeedItem key={row.id} row={row} />)}
            </section>
          ) : (
            <div className="chart-card">
              <div className="no-data">No product news items match the current filters.</div>
            </div>
          )}
        </>
      )}
    </div>
  );
};

const App = () => {
  const [newsRows, setNewsRows] = useState(() => readProductNewsCache());
  const [loading, setLoading] = useState(() => readProductNewsCache().length === 0);
  const [error, setError] = useState('');

  useEffect(() => {
    const load = async () => {
      try {
        const cachedRows = readProductNewsCache();
        if (cachedRows.length) {
          setNewsRows(cachedRows);
          setLoading(false);
          return;
        }

        if (!window.dashboardApi || typeof window.dashboardApi.getProductNews !== 'function') {
          throw new Error('The shared dashboard service is not available in the browser yet.');
        }

        const productNews = await window.dashboardApi.getProductNews();
        setNewsRows(productNews);
        writeProductNewsCache(productNews);
      } catch (e) {
        setError(e.message || String(e));
      } finally {
        setLoading(false);
      }
    };

    load();
  }, []);

  const sidebar = { __html: window.renderSidebar('product-news') };

  return (
    <div className="shell">
      <div style={{ display:'contents' }} dangerouslySetInnerHTML={sidebar} />
      <main className="app">
        <header className="app-header">
          <div className="header-left">
            <div className="logo">Product News</div>
            <div className="header-sub">Live research feed · filterable source-linked signals</div>
          </div>
          <a className="header-link" href="index.html">Back to home</a>
        </header>
        <section className="app-main">
          {loading ? <LoadingScreen /> : error ? <ErrorScreen message={error} /> : newsRows.length === 0 ? <EmptyScreen /> : <ProductNewsView rows={newsRows} />}
        </section>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
